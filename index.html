<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notepad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f1ea;
    --surface: #ebe6dc;
    --surface-hover: #e2ddd2;
    --surface-active: #d9d3c6;
    --border: #ccc6b8;
    --accent: #b07820;
    --accent-dim: #9a6a1a;
    --accent-glow: rgba(176, 120, 32, 0.1);
    --text: #2a2520;
    --text-muted: #7a7468;
    --text-dim: #a09888;
    --danger: #c45c4a;
    --sidebar-w: 280px;
    --grain-opacity: 0.025;
    --log-left: #f0ece3;
    --log-right: #edf2ed;
    --log-line: #ccc6b8;
  }

  [data-theme="dark"] {
    --bg: #0c0b09;
    --surface: #151412;
    --surface-hover: #1d1b18;
    --surface-active: #252320;
    --border: #2a2825;
    --accent: #d4a853;
    --accent-dim: #b8923f;
    --accent-glow: rgba(212, 168, 83, 0.08);
    --text: #e8e2d6;
    --text-muted: #7a7468;
    --text-dim: #4a4640;
    --danger: #c45c4a;
    --grain-opacity: 0.03;
    --log-left: #181613;
    --log-right: #111712;
    --log-line: #2a2825;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    transition: background 0.35s ease, color 0.35s ease;
  }

  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .app { display: flex; height: 100vh; width: 100vw; animation: fadeIn 0.4s ease; }

  /* ══ SIDEBAR ══ */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 10;
    transition: background 0.35s ease, border-color 0.35s ease,
                width 0.35s cubic-bezier(0.4,0,0.2,1),
                min-width 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .sidebar-header {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.35s ease, padding 0.3s ease;
    overflow: hidden;
  }

  .sidebar-header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
    overflow: hidden;
    transition: color 0.35s ease, opacity 0.25s ease, width 0.3s ease;
  }

  .sidebar-header h1 span { color: var(--accent); }

  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    transition: flex-direction 0.3s ease, gap 0.3s ease;
  }

  .sidebar.collapsed .header-actions { flex-direction: column; gap: 10px; }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .icon-btn:hover { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-glow); }
  .icon-btn.active { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-glow); }

  .icon-btn svg {
    width: 15px; height: 15px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    transition: transform 0.4s ease, opacity 0.3s ease;
    position: absolute;
  }

  .icon-btn .icon-sun  { opacity: 0; transform: rotate(-90deg) scale(0.5); }
  .icon-btn .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
  [data-theme="dark"] .icon-btn .icon-sun  { opacity: 1; transform: rotate(0deg) scale(1); }
  [data-theme="dark"] .icon-btn .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }

  .sidebar-toggle-header {
    display: flex; align-items: center; justify-content: center;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 34px; height: 34px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
  }

  .sidebar-toggle-header:hover { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-glow); }

  .sidebar-actions {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    transition: padding 0.3s ease;
  }

  .btn-new {
    flex: 1;
    background: var(--accent-glow);
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 8px 12px;
    border-radius: 4px; cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    overflow: hidden; white-space: nowrap;
  }

  .btn-new:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .btn-import {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    padding: 8px 12px;
    border-radius: 4px; cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    overflow: hidden; white-space: nowrap;
  }

  .btn-import:hover { background: var(--surface-hover); color: var(--text); border-color: var(--text-dim); }

  .search-box {
    padding: 0 16px 12px;
    transition: opacity 0.25s ease, height 0.3s ease, padding 0.3s ease;
    overflow: hidden;
  }

  .search-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 4px; outline: none;
    transition: border-color 0.2s ease, background 0.35s ease, color 0.35s ease;
  }

  .search-box input::placeholder { color: var(--text-dim); }
  .search-box input:focus { border-color: var(--accent-dim); }

  .notes-list {
    flex: 1; overflow-y: auto; padding: 4px 8px;
    transition: padding 0.3s ease;
  }

  .note-item {
    padding: 12px 14px;
    border-radius: 4px; cursor: pointer;
    transition: all 0.15s ease;
    margin-bottom: 2px;
    position: relative;
    border: 1px solid transparent;
  }

  .note-item:hover { background: var(--surface-hover); }
  .note-item.active { background: var(--surface-active); border-color: var(--border); }
  .note-item[draggable="true"] { cursor: grab; }
  .note-item.dragging { opacity: 0.4; cursor: grabbing; }
  .note-item.drag-over { border-top: 2px solid var(--accent); }

  .note-item-title {
    font-family: 'Syne', sans-serif;
    font-size: 12px; font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-right: 20px;
    transition: color 0.35s ease, opacity 0.2s ease, max-height 0.3s ease, margin 0.3s ease;
    max-height: 100px;
  }

  .note-item-preview {
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    transition: color 0.35s ease, opacity 0.2s ease, max-height 0.3s ease, margin 0.3s ease;
    max-height: 100px;
  }

  .note-item-date {
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px;
    transition: color 0.35s ease, opacity 0.2s ease, max-height 0.3s ease, margin 0.3s ease;
    max-height: 100px;
  }

  .note-item .delete-btn {
    position: absolute; top: 10px; right: 10px;
    width: 18px; height: 18px;
    background: none; border: none;
    color: var(--text-dim);
    cursor: pointer; font-size: 14px;
    line-height: 18px; text-align: center;
    border-radius: 3px; opacity: 0;
    transition: all 0.15s ease;
  }

  .note-item:hover .delete-btn { opacity: 1; }
  .note-item .delete-btn:hover { color: var(--danger); background: rgba(196,92,74,0.1); }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    transition: border-color 0.35s ease, opacity 0.25s ease, height 0.3s ease, padding 0.3s ease;
    overflow: hidden;
  }

  .sidebar-footer span {
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  .sidebar-backup {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px;
    transition: border-color 0.35s ease, padding 0.3s ease;
  }

  .btn-backup, .btn-restore {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 10px; font-weight: 500;
    padding: 7px 8px;
    border-radius: 4px; cursor: pointer;
    transition: all 0.2s ease;
    text-transform: uppercase; letter-spacing: 0.07em;
    white-space: nowrap;
    display: flex; align-items: center; justify-content: center; gap: 4px;
    overflow: hidden;
  }

  .btn-backup {
    background: var(--accent-glow); border: 1px solid var(--accent-dim); color: var(--accent);
  }
  .btn-backup:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .btn-restore {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  }
  .btn-restore:hover { background: var(--surface-hover); color: var(--text); border-color: var(--text-dim); }

  /* ══ COLLAPSED SIDEBAR ══ */
  .sidebar.collapsed { width: 56px; min-width: 56px; }
  .sidebar.collapsed .sidebar-header { padding: 16px 4px; justify-content: center; }
  .sidebar.collapsed .sidebar-header h1 { opacity: 0; width: 0; margin: 0; }
  .sidebar.collapsed .sidebar-actions { padding: 8px; flex-direction: column; align-items: center; gap: 8px; }
  .sidebar.collapsed .btn-new,
  .sidebar.collapsed .btn-import,
  .sidebar.collapsed .btn-backup,
  .sidebar.collapsed .btn-restore { flex: none; width: 40px; height: 40px; padding: 0; font-size: 18px; }

  .btn-label {
    display: inline-block;
    transition: opacity 0.2s ease, max-width 0.3s ease;
    max-width: 200px; opacity: 1; overflow: hidden; white-space: nowrap; vertical-align: middle;
  }

  .sidebar.collapsed .btn-label { opacity: 0; max-width: 0; }
  .sidebar.collapsed .search-box { opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; pointer-events: none; }
  .sidebar.collapsed .notes-list { padding: 4px; }

  .sidebar.collapsed .note-item {
    padding: 10px 2px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    min-height: 48px;
  }

  .sidebar.collapsed .note-item-title,
  .sidebar.collapsed .note-item-preview,
  .sidebar.collapsed .note-item-date {
    opacity: 0; max-height: 0; min-height: 0; margin: 0; overflow: hidden; pointer-events: none;
  }

  .sidebar.collapsed .note-item .delete-btn { opacity: 0; pointer-events: none; }

  .note-abbrev {
    display: none;
    font-family: 'Syne', sans-serif;
    font-size: 10px; font-weight: 600;
    color: var(--text-muted);
    text-align: center; line-height: 1; letter-spacing: 0.02em;
  }

  .sidebar.collapsed .note-abbrev { display: block; }
  .sidebar.collapsed .note-item.active .note-abbrev { color: var(--accent); }
  .sidebar.collapsed .sidebar-footer { opacity: 0; height: 0; padding-top: 0; padding-bottom: 0; pointer-events: none; }
  .sidebar.collapsed .sidebar-backup { padding: 8px; flex-direction: column; align-items: center; gap: 8px; }

  /* ══ MAIN ══ */
  .main {
    flex: 1; display: flex; flex-direction: column;
    min-width: 0; position: relative;
  }

  .editor-toolbar {
    padding: 12px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg); min-height: 48px;
    transition: background 0.35s ease, border-color 0.35s ease;
  }

  .editor-title-wrap {
    display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;
  }

  .editor-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--text);
    background: none; border: none; outline: none;
    padding: 4px 0; flex: 1; min-width: 0;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease, color 0.35s ease;
  }

  .editor-title:focus { border-bottom-color: var(--accent-dim); }

  .editor-area { flex: 1; position: relative; overflow: hidden; }

  .editor-textarea {
    width: 100%; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px; line-height: 1.85;
    border: none; outline: none; resize: none;
    padding: 32px 40px; tab-size: 4;
    transition: background 0.35s ease, color 0.35s ease;
  }

  .editor-textarea::placeholder { color: var(--text-dim); }

  .status-bar {
    padding: 6px 32px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; justify-content: space-between; align-items: center;
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
    min-height: 38px;
    transition: background 0.35s ease, border-color 0.35s ease, color 0.35s ease;
  }

  .status-left, .status-right { display: flex; gap: 20px; align-items: center; }

  .save-indicator {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent); margin-right: 6px; opacity: 0;
    transition: opacity 0.3s ease;
  }
  .save-indicator.show { opacity: 1; }

  /* ══ EMPTY STATE ══ */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-dim); gap: 12px; user-select: none;
  }

  .empty-state .icon { font-family: 'Instrument Serif', serif; font-size: 48px; color: var(--border); }
  .empty-state p { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; }
  .empty-state .shortcut { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .empty-state .shortcut kbd {
    background: var(--surface); border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 3px;
    font-family: 'DM Mono', monospace; font-size: 10px; margin: 0 2px;
  }

  /* ══ GRAIN ══ */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: var(--grain-opacity);
    pointer-events: none; z-index: 999;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ══ MOBILE ══ */
  @media (max-width: 700px) {
    .sidebar, .sidebar.collapsed {
      width: 100%; min-width: 100%;
      position: absolute; z-index: 100;
      transform: translateX(-100%);
      transition: transform 0.25s ease, background 0.35s ease;
    }
    .sidebar.open, .sidebar.collapsed.open { transform: translateX(0); }
    .sidebar-toggle-mobile { display: flex !important; }
    .sidebar-toggle-header { display: none !important; }
    .editor-textarea { padding: 20px; font-size: 13px; }
    .editor-toolbar { padding: 10px 16px; }
    .status-bar { padding: 6px 16px; }
    .log-scroll { padding: 16px 10px 100px; }
    .log-entry { grid-template-columns: 1fr; }
    .timeline-center { display: none; }
  }

  .sidebar-toggle-mobile {
    display: none; align-items: center; justify-content: center;
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    font-size: 16px; width: 32px; height: 32px; border-radius: 3px;
    cursor: pointer; margin-right: 8px; transition: all 0.2s ease;
  }

  .sidebar-toggle-mobile:hover { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-glow); }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 99;
  }
  .overlay.show { display: block; }

  /* ══════════════════════════════════
     LOG MODE
  ══════════════════════════════════ */

  #logContainer {
    display: none; flex: 1; flex-direction: column;
    height: 100%; background: var(--bg);
    transition: background 0.35s ease;
  }

  /* Log toolbar */
  .log-toolbar {
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 0;
    background: var(--bg); min-height: 48px;
    transition: background 0.35s ease, border-color 0.35s ease;
  }

  .log-toolbar-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--text);
    display: flex; align-items: center; gap: 8px;
    flex: 1;
  }

  .log-toolbar-title svg {
    width: 15px; height: 15px;
    stroke: var(--accent); fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* Month navigator */
  .month-nav {
    display: flex; align-items: center; gap: 2px;
  }

  .month-nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 28px; height: 28px;
    border-radius: 3px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.15s ease;
    line-height: 1;
  }

  .month-nav-btn:hover { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-glow); }
  .month-nav-btn:disabled { opacity: 0.3; cursor: default; pointer-events: none; }

  .month-nav-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; font-weight: 500;
    color: var(--text);
    min-width: 90px; text-align: center;
    letter-spacing: 0.03em;
    padding: 0 6px;
  }

  .month-nav-label.is-current { color: var(--accent); }

  .log-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    background: var(--surface); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 10px;
    letter-spacing: 0.04em;
    margin-left: 8px;
  }

  /* Scrollable area */
  .log-scroll {
    flex: 1; overflow-y: auto;
    padding: 28px 32px 100px;
  }

  /* New entry box */
  .log-new-entry {
    border: 1px dashed var(--border);
    border-radius: 6px;
    margin-bottom: 36px;
    transition: border-color 0.2s ease;
    overflow: hidden;
  }

  .log-new-entry:focus-within { border-color: var(--accent-dim); }

  .log-new-header {
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px dashed var(--border);
    transition: border-color 0.2s ease;
  }

  .log-new-entry:focus-within .log-new-header { border-color: var(--accent-dim); }

  .log-new-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim);
  }

  .log-new-date {
    font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dim);
  }

  .log-new-textarea {
    width: 100%; background: transparent; border: none; outline: none; resize: none;
    font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.7; color: var(--text);
    padding: 14px; min-height: 90px;
  }

  .log-new-textarea::placeholder { color: var(--text-dim); }

  .log-new-footer {
    padding: 8px 14px;
    border-top: 1px dashed var(--border);
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.2s ease;
  }

  .log-new-entry:focus-within .log-new-footer { border-color: var(--accent-dim); }

  .log-hint {
    font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .log-submit-btn {
    background: var(--accent); border: none; color: var(--bg);
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 6px 14px; border-radius: 3px; cursor: pointer;
    transition: all 0.15s ease;
  }

  .log-submit-btn:hover { opacity: 0.85; }
  .log-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Timeline entry */
  .log-entry {
    display: grid;
    grid-template-columns: 1fr 76px 1fr;
    gap: 0;
    margin-bottom: 32px;
    position: relative;
    align-items: start;
    animation: entryIn 0.3s ease;
  }

  @keyframes entryIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* Left box */
  .log-report-box {
    background: var(--log-left);
    border: 1px solid var(--border);
    border-radius: 6px 0 0 6px;
    min-height: 80px;
    transition: background 0.35s ease, border-color 0.35s ease;
  }

  .log-report-box.editing { border-color: var(--accent-dim); box-shadow: 0 0 0 2px var(--accent-glow); }

  .log-box-header {
    padding: 9px 13px 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    transition: border-color 0.35s ease;
  }

  .log-box-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim);
  }

  .log-edit-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim);
    font-family: 'DM Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 2px 6px; border-radius: 3px; transition: all 0.15s ease;
  }

  .log-edit-btn:hover { color: var(--accent); background: var(--accent-glow); }

  .log-report-content {
    padding: 11px 13px;
    font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.7; color: var(--text);
    white-space: pre-wrap; word-break: break-word; min-height: 55px;
  }

  /* Original text toggle */
  .log-original-toggle {
    padding: 0 13px 9px;
    display: flex; align-items: center; gap: 6px;
  }

  .log-original-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: 9px;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.07em;
    padding: 2px 0; transition: color 0.15s ease;
    display: flex; align-items: center; gap: 4px;
  }

  .log-original-btn:hover { color: var(--text-muted); }

  .log-original-btn svg {
    width: 10px; height: 10px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    transition: transform 0.2s ease;
  }

  .log-original-btn.open svg { transform: rotate(90deg); }

  .log-original-text {
    display: none;
    padding: 8px 13px 10px;
    border-top: 1px dashed var(--border);
    font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.65;
    color: var(--text-muted); white-space: pre-wrap; word-break: break-word;
    font-style: italic;
  }

  .log-original-text.show { display: block; }

  .log-report-textarea {
    width: 100%; background: transparent; border: none; outline: none; resize: none;
    font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.7; color: var(--text);
    padding: 11px 13px; min-height: 70px; display: none;
  }

  .log-report-box.editing .log-report-content { display: none; }
  .log-report-box.editing .log-original-toggle { display: none; }
  .log-report-box.editing .log-original-text { display: none !important; }
  .log-report-box.editing .log-report-textarea { display: block; }

  .log-report-actions {
    padding: 7px 13px; display: none; gap: 6px;
    border-top: 1px solid var(--border);
  }

  .log-report-box.editing .log-report-actions { display: flex; }

  .log-save-btn {
    background: var(--accent); border: none; color: var(--bg);
    font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 5px 10px; border-radius: 3px; cursor: pointer; transition: all 0.15s ease;
  }

  .log-save-btn:hover { opacity: 0.85; }

  .log-cancel-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    font-family: 'DM Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 5px 10px; border-radius: 3px; cursor: pointer; transition: all 0.15s ease;
  }

  .log-cancel-btn:hover { background: var(--surface-hover); color: var(--text); }

  /* Center timeline */
  .timeline-center {
    display: flex; flex-direction: column; align-items: center;
    position: relative; padding-top: 14px; z-index: 1;
  }

  .timeline-line-top { width: 1px; height: 14px; background: var(--log-line); transition: background 0.35s ease; }
  .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin: 4px 0; box-shadow: 0 0 0 3px var(--accent-glow); }

  .timeline-date {
    font-family: 'DM Mono', monospace; font-size: 8px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.06em;
    text-align: center; line-height: 1.4; white-space: nowrap; margin-top: 4px;
  }

  .timeline-line-bottom { flex: 1; min-height: 40px; width: 1px; background: var(--log-line); transition: background 0.35s ease; }

  /* Right box */
  .log-feedback-box {
    background: var(--log-right);
    border: 1px solid var(--border); border-left: none;
    border-radius: 0 6px 6px 0; min-height: 80px;
    transition: background 0.35s ease, border-color 0.35s ease;
    overflow: hidden;
  }

  .log-feedback-header {
    padding: 9px 13px 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    transition: border-color 0.35s ease;
  }

  .log-feedback-label {
    font-family: 'DM Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent);
  }

  .log-feedback-content {
    padding: 11px 13px;
    font-family: 'DM Mono', monospace; font-size: 12px; line-height: 1.7; color: var(--text);
    white-space: pre-wrap; word-break: break-word; min-height: 55px;
  }

  .log-feedback-content.pending { color: var(--text-dim); font-style: italic; }

  .feedback-loading { display: flex; align-items: center; gap: 4px; padding: 14px; }

  .feedback-loading span {
    width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
    animation: dotPulse 1.2s ease-in-out infinite;
  }

  .feedback-loading span:nth-child(2) { animation-delay: 0.2s; }
  .feedback-loading span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* Empty / no-entries */
  .log-empty {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
  }

  .log-empty-icon { font-family: 'Instrument Serif', serif; font-size: 36px; color: var(--border); margin-bottom: 8px; }
  .log-empty p { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }

  /* Past-month banner (no new entry) */
  .log-past-notice {
    border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 16px;
    margin-bottom: 32px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim);
    text-align: center; letter-spacing: 0.04em;
  }
</style>
</head>
<body>

<div class="app">
  <div class="overlay" id="overlay"></div>

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span>/</span> notepad</h1>
      <div class="header-actions">
        <button class="sidebar-toggle-header" data-action="toggle-sidebar" title="Toggle sidebar">☰</button>

        <!-- Log icon -->
        <button class="icon-btn" id="logToggleBtn" data-action="toggle-log" title="Marketing log">
          <svg class="icon-log" viewBox="0 0 24 24" style="position:absolute;">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
        </button>

        <!-- Theme toggle -->
        <button class="icon-btn" id="themeToggle" data-action="toggle-theme" title="Toggle light/dark mode">
          <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar-actions">
      <button class="btn-new" data-action="new-note" title="Ctrl+N">
        <span class="btn-icon">+</span><span class="btn-label"> New Note</span>
      </button>
      <button class="btn-import" data-action="import" title="Import .txt or .html">
        <span class="btn-icon">↓</span><span class="btn-label"> Import</span>
      </button>
      <input type="file" id="importFile" accept=".txt,.html,text/plain,text/html" style="display:none">
    </div>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search notes...">
    </div>

    <div class="notes-list" id="notesList"></div>

    <div class="sidebar-footer">
      <span id="noteCount">0 notes</span>
      <span id="totalWords">0 words</span>
    </div>

    <div class="sidebar-backup">
      <button class="btn-backup" data-action="backup" title="Save all notes to a .json file">
        <span class="btn-icon">⬇</span><span class="btn-label"> Backup</span>
      </button>
      <button class="btn-restore" data-action="restore" title="Load notes from a backup .json file">
        <span class="btn-icon">⬆</span><span class="btn-label"> Restore</span>
      </button>
      <input type="file" id="restoreFile" accept=".json,application/json" style="display:none">
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main" id="mainArea">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="icon">N</div>
      <p>No note selected</p>
      <div class="shortcut">Press <kbd>Ctrl</kbd> + <kbd>N</kbd> to create one</div>
    </div>

    <!-- Note editor -->
    <div id="editorContainer" style="display:none; flex:1; flex-direction:column; height:100%;">
      <div class="editor-toolbar">
        <div class="editor-title-wrap">
          <button class="sidebar-toggle-mobile" data-action="toggle-sidebar" title="Toggle sidebar">☰</button>
          <input type="text" class="editor-title" id="editorTitle" placeholder="Untitled">
        </div>
      </div>
      <div class="editor-area">
        <textarea class="editor-textarea" id="editorTextarea" placeholder="Start writing..."></textarea>
      </div>
      <div class="status-bar">
        <div class="status-left">
          <span><span class="save-indicator" id="saveIndicator"></span><span id="saveStatus">Saved</span></span>
          <span id="charCount">0 chars</span>
        </div>
        <div class="status-right">
          <span id="wordCount">0 words</span>
          <span id="lineCount">0 lines</span>
          <span id="cursorPos">Ln 1, Col 1</span>
        </div>
      </div>
    </div>

    <!-- Log view -->
    <div id="logContainer">
      <div class="log-toolbar">
        <div class="log-toolbar-title">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
          </svg>
          Marketing Log
          <span class="log-badge" id="logBadge">0 entries</span>
        </div>
        <!-- Month navigator -->
        <div class="month-nav">
          <button class="month-nav-btn" id="monthPrev" title="Previous month">&#8249;</button>
          <span class="month-nav-label" id="monthLabel"></span>
          <button class="month-nav-btn" id="monthNext" title="Next month" disabled>&#8250;</button>
        </div>
      </div>

      <div class="log-scroll" id="logScroll">
        <!-- New entry form (only shown for current month) -->
        <div id="logNewEntry" class="log-new-entry">
          <div class="log-new-header">
            <span class="log-new-label">Today's report</span>
            <span class="log-new-date" id="logNewDate"></span>
          </div>
          <textarea class="log-new-textarea" id="logNewTextarea" placeholder="Write your marketing report for today..."></textarea>
          <div class="log-new-footer">
            <span class="log-hint">Ctrl+Enter to submit · English auto-corrected on save</span>
            <button class="log-submit-btn" id="logSubmitBtn" data-action="submit-log">Submit</button>
          </div>
        </div>

        <!-- Past-month notice (shown when browsing old months) -->
        <div id="logPastNotice" class="log-past-notice" style="display:none;">
          Viewing past entries — switch to the current month to add a new report.
        </div>

        <!-- Timeline -->
        <div id="logTimeline"></div>
      </div>
    </div>

  </main>
</div>

<script>
// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let notes      = JSON.parse(localStorage.getItem('notepad_notes') || '[]');
let logEntries = JSON.parse(localStorage.getItem('notepad_log')   || '[]');
let activeNoteId  = null;
let saveTimeout   = null;
let draggedId     = null;
let isLogMode     = false;

// Month navigator: 0 = current month, -1 = one month back, etc.
let monthOffset = 0;

const $ = id => document.getElementById(id);

// ── Theme ──
function getStoredTheme() { return localStorage.getItem('notepad_theme') || 'light'; }
function applyTheme(t) {
  t === 'dark'
    ? document.documentElement.setAttribute('data-theme', 'dark')
    : document.documentElement.removeAttribute('data-theme');
  localStorage.setItem('notepad_theme', t);
}
function toggleTheme() { applyTheme(getStoredTheme() === 'dark' ? 'light' : 'dark'); }
applyTheme(getStoredTheme());

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
function init() {
  const savedCollapsed = localStorage.getItem('notepad_sidebar_collapsed');
  if (savedCollapsed === '1' && window.innerWidth > 700) $('sidebar').classList.add('collapsed');

  setupEventListeners();
  renderNotesList();
  if (notes.length > 0) selectNote(notes[0].id);
  updateFooter();
  setLogNewDate();
}

function setupEventListeners() {
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    switch (btn.dataset.action) {
      case 'new-note':       createNote(); break;
      case 'import':         $('importFile').click(); break;
      case 'toggle-theme':   toggleTheme(); break;
      case 'toggle-sidebar': toggleSidebar(); break;
      case 'toggle-log':     toggleLogMode(); break;
      case 'backup':         backupNotes(); break;
      case 'restore':        $('restoreFile').click(); break;
      case 'submit-log':     submitLogEntry(); break;
    }
  });

  $('notesList').addEventListener('click', e => {
    const del = e.target.closest('.delete-btn');
    if (del) { const item = del.closest('.note-item'); if (item) deleteNote(item.dataset.id, e); return; }
    const item = e.target.closest('.note-item');
    if (item) { selectNote(item.dataset.id); if (isLogMode) toggleLogMode(false); }
  });

  $('notesList').addEventListener('dragstart', handleDragStart);
  $('notesList').addEventListener('dragend',   handleDragEnd);
  $('notesList').addEventListener('dragover',  handleDragOver);
  $('notesList').addEventListener('dragleave', handleDragLeave);
  $('notesList').addEventListener('drop',      handleDrop);

  $('searchInput').addEventListener('input', filterNotes);
  $('editorTitle').addEventListener('input', onTitleChange);
  $('editorTextarea').addEventListener('input', onContentChange);
  $('importFile').addEventListener('change', handleImport);
  $('restoreFile').addEventListener('change', restoreNotes);
  $('overlay').addEventListener('click', closeSidebar);
  $('editorTextarea').addEventListener('click', updateCursorPos);
  $('editorTextarea').addEventListener('keyup', updateCursorPos);

  $('logNewTextarea').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') submitLogEntry();
  });

  $('monthPrev').addEventListener('click', () => { monthOffset--; renderLogView(); });
  $('monthNext').addEventListener('click', () => { monthOffset++; if (monthOffset > 0) monthOffset = 0; renderLogView(); });
}

// ══════════════════════════════════
// LOG MODE
// ══════════════════════════════════

function setLogNewDate() {
  $('logNewDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
  });
}

function toggleLogMode(forceOff) {
  isLogMode = forceOff === false ? false : !isLogMode;
  $('logToggleBtn').classList.toggle('active', isLogMode);

  if (isLogMode) {
    $('logContainer').style.display = 'flex';
    $('logContainer').style.flexDirection = 'column';
    $('emptyState').style.display = 'none';
    $('editorContainer').style.display = 'none';
    monthOffset = 0;
    setLogNewDate();
    renderLogView();
  } else {
    $('logContainer').style.display = 'none';
    activeNoteId ? ($('editorContainer').style.display = 'flex') : ($('emptyState').style.display = 'flex');
  }
}

// Derive year/month from offset
function getViewMonth() {
  const d = new Date();
  d.setDate(1);
  d.setMonth(d.getMonth() + monthOffset);
  return { year: d.getFullYear(), month: d.getMonth() }; // month 0-indexed
}

function renderLogView() {
  const { year, month } = getViewMonth();
  const isCurrentMonth = monthOffset === 0;

  // Month label
  const labelEl = $('monthLabel');
  labelEl.textContent = new Date(year, month, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  labelEl.className = 'month-nav-label' + (isCurrentMonth ? ' is-current' : '');

  // Next button disabled if already at current month
  $('monthNext').disabled = isCurrentMonth;

  // Show/hide new-entry form vs past notice
  if (isCurrentMonth) {
    $('logNewEntry').style.display = '';
    $('logPastNotice').style.display = 'none';
  } else {
    $('logNewEntry').style.display = 'none';
    $('logPastNotice').style.display = '';
  }

  // Filter entries for this month
  const monthEntries = logEntries.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });

  // Badge shows total across all months
  $('logBadge').textContent = logEntries.length + ' total · ' + monthEntries.length + ' this view';

  renderLogTimeline(monthEntries);
}

async function submitLogEntry() {
  const raw = $('logNewTextarea').value.trim();
  if (!raw) return;

  const btn = $('logSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  // Entry starts with raw text; will be polished async
  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 5),
    reportOriginal: raw,   // always keep original
    report: raw,           // will be replaced with polished version
    feedback: null,
    date: new Date().toISOString(),
    loadingFeedback: true,
    polishing: true
  };

  logEntries.unshift(entry);
  saveLog();
  renderLogView();
  $('logNewTextarea').value = '';
  btn.disabled = false;
  btn.textContent = 'Submit';

  // Run polish + feedback in parallel
  const [polished, feedback] = await Promise.allSettled([
    polishEnglish(raw),
    getFeedback(raw)
  ]);

  entry.report    = polished.status === 'fulfilled' ? polished.value : raw;
  entry.feedback  = feedback.status  === 'fulfilled' ? feedback.value  : 'Could not get feedback. You can edit and re-save to try again.';
  entry.loadingFeedback = false;
  entry.polishing       = false;

  saveLog();
  renderLogView();
}

async function polishEnglish(text) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: `You are an English copy-editor. The user writes in informal or broken English.
Rewrite their text with correct grammar, clear phrasing, and natural flow.
Keep the meaning and all details exactly the same — do not add, remove, or change any facts.
Keep the same tone (casual or formal, however the user wrote it).
Return ONLY the corrected text. No explanations, no quotes, no preamble.`,
      messages: [{ role: "user", content: text }]
    })
  });
  if (!response.ok) throw new Error('polish API error');
  const data = await response.json();
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('').trim();
}

async function getFeedback(reportText) {
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: `You are a sharp, concise marketing coach reviewing daily marketing reports.
Give direct, actionable feedback in 3–5 sentences.
- Acknowledge what went well (if anything).
- Point out gaps or missed opportunities.
- Give one specific, concrete suggestion for tomorrow.
Be honest but constructive. Write in short, punchy prose — no bullet lists, no bold, no markdown.`,
      messages: [{ role: "user", content: `Here is my marketing report for today:\n\n${reportText}` }]
    })
  });
  if (!response.ok) throw new Error('feedback API error');
  const data = await response.json();
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('').trim();
}

function renderLogTimeline(entries) {
  const container = $('logTimeline');

  if (entries.length === 0) {
    container.innerHTML = `
      <div class="log-empty">
        <div class="log-empty-icon">◎</div>
        <p>${monthOffset === 0 ? 'No entries yet — write your first report above' : 'No entries for this month'}</p>
      </div>`;
    return;
  }

  container.innerHTML = entries.map((entry, idx) => {
    const d = new Date(entry.date);
    const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    const timeStr = d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    const isLast  = idx === entries.length - 1;
    const hasOriginal = entry.reportOriginal && entry.reportOriginal !== entry.report;

    // Feedback cell
    let feedbackHTML = '';
    if (entry.loadingFeedback) {
      feedbackHTML = `<div class="feedback-loading"><span></span><span></span><span></span></div>`;
    } else if (entry.feedback) {
      feedbackHTML = `<div class="log-feedback-content">${escapeHtml(entry.feedback)}</div>`;
    } else {
      feedbackHTML = `<div class="log-feedback-content pending">Awaiting feedback…</div>`;
    }

    // Original text toggle (only if it differs from polished)
    const origToggle = hasOriginal ? `
      <div class="log-original-toggle">
        <button class="log-original-btn" data-orig="${entry.id}">
          <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          Original
        </button>
      </div>
      <div class="log-original-text" id="orig-${entry.id}">${escapeHtml(entry.reportOriginal)}</div>
    ` : '';

    return `
      <div class="log-entry" data-entry-id="${entry.id}">
        <div class="log-report-box" id="box-${entry.id}">
          <div class="log-box-header">
            <span class="log-box-label">My report</span>
            <button class="log-edit-btn" data-edit="${entry.id}">Edit</button>
          </div>
          <div class="log-report-content">${escapeHtml(entry.report)}${entry.polishing ? ' <span style="color:var(--text-dim);font-size:10px;">(polishing…)</span>' : ''}</div>
          <textarea class="log-report-textarea" data-ta="${entry.id}">${escapeHtml(entry.report)}</textarea>
          <div class="log-report-actions">
            <button class="log-save-btn" data-save="${entry.id}">Save &amp; Refresh</button>
            <button class="log-cancel-btn" data-cancel="${entry.id}">Cancel</button>
          </div>
          ${origToggle}
        </div>

        <div class="timeline-center">
          <div class="timeline-line-top"></div>
          <div class="timeline-dot"></div>
          <div class="timeline-date">${dateStr}<br>${timeStr}</div>
          ${!isLast ? '<div class="timeline-line-bottom"></div>' : ''}
        </div>

        <div class="log-feedback-box">
          <div class="log-feedback-header">
            <span class="log-feedback-label">Claude's feedback</span>
          </div>
          ${feedbackHTML}
        </div>
      </div>`;
  }).join('');

  // Wire buttons
  container.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => startEditEntry(btn.dataset.edit)));
  container.querySelectorAll('[data-save]').forEach(btn =>
    btn.addEventListener('click', () => saveEditEntry(btn.dataset.save)));
  container.querySelectorAll('[data-cancel]').forEach(btn =>
    btn.addEventListener('click', () => cancelEditEntry(btn.dataset.cancel)));
  container.querySelectorAll('[data-orig]').forEach(btn =>
    btn.addEventListener('click', () => toggleOriginal(btn.dataset.orig, btn)));
}

function toggleOriginal(id, btn) {
  const el = document.getElementById('orig-' + id);
  if (!el) return;
  const open = el.classList.toggle('show');
  btn.classList.toggle('open', open);
}

function startEditEntry(id) {
  const box = document.getElementById('box-' + id);
  if (!box) return;
  box.classList.add('editing');
  const ta = box.querySelector('[data-ta]');
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

function cancelEditEntry(id) {
  const box = document.getElementById('box-' + id);
  if (box) box.classList.remove('editing');
}

async function saveEditEntry(id) {
  const box = document.getElementById('box-' + id);
  if (!box) return;
  const ta = box.querySelector('[data-ta]');
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) return;

  const entry = logEntries.find(e => e.id === id);
  if (!entry) return;

  entry.reportOriginal  = newText;
  entry.report          = newText;
  entry.feedback        = null;
  entry.loadingFeedback = true;
  entry.polishing       = true;
  saveLog();
  renderLogView();

  const [polished, feedback] = await Promise.allSettled([
    polishEnglish(newText),
    getFeedback(newText)
  ]);

  entry.report          = polished.status === 'fulfilled' ? polished.value : newText;
  entry.feedback        = feedback.status  === 'fulfilled' ? feedback.value  : 'Could not get feedback. Try again later.';
  entry.loadingFeedback = false;
  entry.polishing       = false;

  saveLog();
  renderLogView();
}

function saveLog() {
  localStorage.setItem('notepad_log', JSON.stringify(logEntries));
}

// ══════════════════════════════════
// DRAG & DROP
// ══════════════════════════════════
function handleDragStart(e) {
  const item = e.target.closest('.note-item');
  if (!item) return;
  if (e.target.closest('.delete-btn')) { e.preventDefault(); return; }
  draggedId = item.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedId);
  item.classList.add('dragging');
}

function handleDragEnd(e) {
  const item = e.target.closest('.note-item');
  if (item) item.classList.remove('dragging');
  draggedId = null;
  document.querySelectorAll('.note-item').forEach(el => el.classList.remove('drag-over'));
}

function handleDragOver(e) {
  e.preventDefault();
  const target = e.target.closest('.note-item');
  if (!target || target.dataset.id === draggedId) return;
  document.querySelectorAll('.note-item').forEach(el => el.classList.remove('drag-over'));
  target.classList.add('drag-over');
}

function handleDragLeave(e) {
  const target = e.target.closest('.note-item');
  if (target) target.classList.remove('drag-over');
}

function handleDrop(e) {
  e.preventDefault();
  const target = e.target.closest('.note-item');
  document.querySelectorAll('.note-item').forEach(el => el.classList.remove('drag-over'));
  if (!target || !draggedId || target.dataset.id === draggedId) return;

  const fromIndex = notes.findIndex(n => n.id === draggedId);
  const toIndex   = notes.findIndex(n => n.id === target.dataset.id);
  if (fromIndex === -1 || toIndex === -1) return;

  const rect        = target.getBoundingClientRect();
  const insertBefore = e.clientY < rect.top + rect.height / 2;
  const [moved] = notes.splice(fromIndex, 1);
  let finalIndex = insertBefore
    ? (toIndex < fromIndex ? toIndex : toIndex - 1)
    : (toIndex < fromIndex ? toIndex + 1 : toIndex);
  notes.splice(finalIndex, 0, moved);

  save();
  renderNotesList();
}

// ══════════════════════════════════
// NOTES CRUD
// ══════════════════════════════════
function createNote() {
  const note = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    title: '', content: '',
    created: Date.now(), updated: Date.now()
  };
  notes.unshift(note);
  save();
  renderNotesList();
  selectNote(note.id);
  if (isLogMode) toggleLogMode(false);
  $('editorTitle').focus();
  closeSidebar();
}

function deleteNote(id, e) {
  if (e) e.stopPropagation();
  const note = notes.find(n => n.id === id);
  if (!note) return;
  if (!confirm(`Delete "${note.title || 'Untitled'}"?`)) return;
  notes = notes.filter(n => n.id !== id);
  save();
  if (activeNoteId === id) { activeNoteId = null; notes.length > 0 ? selectNote(notes[0].id) : showEmpty(); }
  renderNotesList();
  updateFooter();
}

function selectNote(id) {
  activeNoteId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;
  $('emptyState').style.display = 'none';
  $('editorContainer').style.display = 'flex';
  $('editorTitle').value   = note.title;
  $('editorTextarea').value = note.content;
  updateStats();
  updateCursorPos();
  renderNotesList();
  $('saveStatus').textContent = 'Saved';
  $('saveIndicator').classList.remove('show');
}

function showEmpty() {
  activeNoteId = null;
  $('emptyState').style.display = 'flex';
  $('editorContainer').style.display = 'none';
}

function onTitleChange() {
  const note = notes.find(n => n.id === activeNoteId);
  if (!note) return;
  note.title   = $('editorTitle').value;
  note.updated = Date.now();
  debounceSave();
  renderNotesList();
}

function onContentChange() {
  const note = notes.find(n => n.id === activeNoteId);
  if (!note) return;
  note.content = $('editorTextarea').value;
  note.updated = Date.now();
  updateStats();
  debounceSave();
  renderNotesList();
}

function save() { localStorage.setItem('notepad_notes', JSON.stringify(notes)); updateFooter(); }

function debounceSave() {
  $('saveStatus').textContent = 'Saving…';
  $('saveIndicator').classList.add('show');
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    save();
    $('saveStatus').textContent = 'Saved';
    setTimeout(() => $('saveIndicator').classList.remove('show'), 1200);
  }, 400);
}

function updateStats() {
  const text = $('editorTextarea').value;
  $('charCount').textContent = text.length + ' chars';
  $('wordCount').textContent = (text.trim() === '' ? 0 : text.trim().split(/\s+/).length) + ' words';
  $('lineCount').textContent = (text === '' ? 1 : text.split('\n').length) + ' lines';
}

function updateCursorPos() {
  const ta   = $('editorTextarea');
  const text = ta.value.substring(0, ta.selectionStart);
  const lines = text.split('\n');
  $('cursorPos').textContent = `Ln ${lines.length}, Col ${lines[lines.length - 1].length + 1}`;
}

function updateFooter() {
  $('noteCount').textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');
  const total = notes.reduce((s, n) => s + (n.content.trim() === '' ? 0 : n.content.trim().split(/\s+/).length), 0);
  $('totalWords').textContent = total + ' words total';
}

// ══════════════════════════════════
// RENDER SIDEBAR
// ══════════════════════════════════
function renderNotesList() {
  const list  = $('notesList');
  const query = $('searchInput').value.toLowerCase().trim();
  const filtered = notes.filter(n =>
    !query ||
    (n.title || '').toLowerCase().includes(query) ||
    (n.content || '').toLowerCase().includes(query)
  );

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:32px 16px;text-align:center;color:var(--text-dim);font-size:11px;text-transform:uppercase;letter-spacing:0.08em;">${query ? 'No matches' : 'No notes yet'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(note => {
    const title   = note.title || 'Untitled';
    const preview = (note.content || '').replace(/\n/g, ' ').substring(0, 60) || 'Empty note';
    return `
      <div class="note-item ${note.id === activeNoteId && !isLogMode ? 'active' : ''}"
           data-id="${note.id}" title="${escapeHtml(title)}" draggable="true">
        <span class="note-abbrev">${escapeHtml(title.slice(0, 3))}</span>
        <div class="note-item-title">${escapeHtml(title)}</div>
        <div class="note-item-preview">${escapeHtml(preview)}</div>
        <div class="note-item-date">${formatDate(note.updated)}</div>
        <button class="delete-btn" title="Delete">×</button>
      </div>`;
  }).join('');
}

function filterNotes() { renderNotesList(); }

// ══════════════════════════════════
// BACKUP / RESTORE / IMPORT
// ══════════════════════════════════
function backupNotes() {
  const backup = { version: 1, exported: new Date().toISOString(), notes, log: logEntries };
  const blob   = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a      = document.createElement('a');
  a.href       = URL.createObjectURL(blob);
  a.download   = `notepad-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function restoreNotes(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const backup     = JSON.parse(ev.target.result);
      const incoming   = Array.isArray(backup) ? backup : (backup.notes || []);
      const incomingLog = backup.log || [];

      if (!Array.isArray(incoming) || incoming.length === 0) { alert('No notes found in this backup file.'); return; }

      const merge = confirm(
        `Found ${incoming.length} note(s)${incomingLog.length ? ` and ${incomingLog.length} log entr${incomingLog.length === 1 ? 'y' : 'ies'}` : ''} in backup.\n\nOK = Merge · Cancel = Replace all`
      );

      if (merge) {
        const existIds    = new Set(notes.map(n => n.id));
        const existLogIds = new Set(logEntries.map(e => e.id));
        notes      = [...incoming.filter(n => !existIds.has(n.id)),    ...notes];
        logEntries = [...incomingLog.filter(e => !existLogIds.has(e.id)), ...logEntries];
      } else {
        notes      = incoming;
        if (incomingLog.length) logEntries = incomingLog;
      }

      save(); saveLog();
      renderNotesList();
      if (isLogMode) renderLogView();
      if (notes.length > 0) selectNote(notes[0].id);
      updateFooter();
    } catch { alert('Could not read backup file. Make sure it is a valid notepad backup.'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    const note = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
      title: file.name.replace(/\.[^/.]+$/, ''),
      content: ev.target.result,
      created: Date.now(), updated: Date.now()
    };
    notes.unshift(note); save(); renderNotesList(); selectNote(note.id); e.target.value = '';
  };
  reader.readAsText(file);
}

// ══════════════════════════════════
// SIDEBAR TOGGLE
// ══════════════════════════════════
function toggleSidebar() {
  if (window.innerWidth <= 700) {
    $('sidebar').classList.toggle('open');
    $('overlay').classList.toggle('show');
  } else {
    $('sidebar').classList.toggle('collapsed');
    localStorage.setItem('notepad_sidebar_collapsed', $('sidebar').classList.contains('collapsed') ? '1' : '0');
  }
}

function closeSidebar() {
  if (window.innerWidth <= 700) { $('sidebar').classList.remove('open'); $('overlay').classList.remove('show'); }
}

// ══════════════════════════════════
// HELPERS
// ══════════════════════════════════
function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function formatDate(ts) {
  const diff = Date.now() - ts;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff / 60000)   + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000)  + 'h ago';
  if (diff < 604800000)return Math.floor(diff / 86400000) + 'd ago';
  return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

// ══════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'n') { e.preventDefault(); createNote(); }
  if (e.ctrlKey && e.key === 's' && !isLogMode) {
    e.preventDefault();
    save();
    $('saveStatus').textContent = 'Saved';
    $('saveIndicator').classList.add('show');
    setTimeout(() => $('saveIndicator').classList.remove('show'), 1200);
  }
  if (e.key === 'Tab' && e.target === $('editorTextarea')) {
    e.preventDefault();
    const ta = $('editorTextarea');
    const s  = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0, s) + '    ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = s + 4;
    onContentChange();
  }
});

// ── Start ──
init();
</script>
